<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHECKOUT — SAVVY COMPUTERS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --black:    #000000;
      --white:    #ffffff;
      --zinc-100: #f4f4f5;
      --zinc-200: #e4e4e7;
      --zinc-800: #27272a;
      --border-heavy: 2.5px solid #000;
      --font-d: 'Barlow Condensed', sans-serif;
      --font-b: 'Barlow', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--zinc-100); color: var(--black); font-family: var(--font-b); }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }
    
    header { background: var(--white); border-bottom: var(--border-heavy); padding: 1.5rem 0; text-align: center; }
    .logo { font-family: var(--font-d); font-weight: 900; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 0.1em; }

    .checkout-grid { display: grid; grid-template-columns: 1fr 400px; gap: 4rem; padding: 5rem 0; }
    .c-form { display: flex; flex-direction: column; gap: 3rem; }
    .c-section { background: var(--white); border: var(--border-heavy); padding: 3.5rem; }
    .c-h { font-family: var(--font-d); font-weight: 900; font-size: 1.5rem; text-transform: uppercase; margin-bottom: 2rem; border-bottom: var(--border-heavy); padding-bottom: 1rem; }
    
    .c-input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
    .c-field { display: flex; flex-direction: column; gap: 0.6rem; }
    .c-lbl { font-family: var(--font-d); font-weight: 800; font-size: 0.72rem; text-transform: uppercase; color: var(--zinc-800); }
    .c-input { padding: 1.25rem; border: var(--border-heavy); font-family: var(--font-b); font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
    .c-input:focus { border-color: var(--zinc-800); background: #fafafa; }

    .c-summary { background: var(--black); color: var(--white); padding: 3.5rem; height: fit-content; position: sticky; top: 2rem; }
    .sum-h { font-family: var(--font-d); font-weight: 900; font-size: 1.25rem; text-transform: uppercase; margin-bottom: 2.5rem; border-bottom: 1px solid #333; padding-bottom: 1rem; }
    .sum-item { display: flex; justify-content: space-between; margin-bottom: 1rem; font-size: 0.9rem; }
    .sum-total { margin-top: 2rem; border-top: 1px solid #333; padding-top: 2rem; display: flex; justify-content: space-between; font-weight: 800; font-size: 1.4rem; }

    .complete-btn { margin-top: 3rem; width: 100%; padding: 1.5rem; background: var(--white); color: var(--black); font-family: var(--font-d); font-weight: 900; font-size: 1rem; text-transform: uppercase; cursor: pointer; border: none; }
    .complete-btn:hover { background: var(--zinc-200); }

    @media (max-width: 900px) {
      .checkout-grid { grid-template-columns: 1fr; }
      .c-summary { position: static; }
    }
  </style>
</head>
<body>
  <header><div class="wrap"><div class="logo">Savvy Computers — Checkout</div></div></header>

  <main class="wrap">
    <div class="checkout-grid">
      <div class="c-form">
        <section class="c-section">
          <div class="c-h">01. Delivery Details</div>
          <div class="c-input-group">
            <div class="c-field"><div class="c-lbl">First Name</div><input type="text" class="c-input" placeholder="Enter first name"></div>
            <div class="c-field"><div class="c-lbl">Last Name</div><input type="text" class="c-input" placeholder="Enter last name"></div>
          </div>
          <div class="c-field"><div class="c-lbl">Street Address</div><input type="text" class="c-input" placeholder="Enter full address"></div>
          <div style="height: 1.5rem;"></div>
          <div class="c-input-group">
            <div class="c-field"><div class="c-lbl">Suburb</div><input type="text" class="c-input"></div>
            <div class="c-field"><div class="c-lbl">Postcode</div><input type="text" class="c-input"></div>
          </div>
        </section>

        <section class="c-section">
          <div class="c-h">02. Billing</div>
          <div class="c-field"><div class="c-lbl">Full Name on Card</div><input type="text" class="c-input"></div>
          <div style="height: 1.5rem;"></div>
          <div class="c-field"><div class="c-lbl">Card Number</div><input type="text" class="c-input" placeholder="0000 0000 0000 0000"></div>
        </section>
      </div>

      <aside class="c-summary">
        <div class="sum-h">Order Summary</div>
        <div class="sum-item"><span>Apex Pro SC01 x1</span><span>$4,499.00</span></div>
        <div class="sum-item" style="color: var(--zinc-500);"><span>Insured Delivery</span><span>$45.00</span></div>
        <div class="sum-total"><span>Total</span><span>$4,544.00 AUD</span></div>
        <button class="complete-btn" onclick="alert('Order Dispatched! Check your email for registry confirmation.'); location.href='index.html'">Complete Purchase →</button>
      </aside>
    </div>
  </main>
</body>
</html>
